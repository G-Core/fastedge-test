name: doctor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode for doctor pipeline
        required: false
        type: string
        default: auto
      target_version:
        description: Exact source tag to use (for example v0.1.0)
        required: false
        type: string
      allow_breaking_update:
        description: Allow breaking update during version resolution
        required: false
        type: boolean
        default: false
      force_analyze:
        description: Force analyze outside configured analyze day
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

env:
  SOURCE_REPO: G-Core/agent-toolkit
  REPORT_TZ: UTC
  PYTHON_VERSION: '3.12'
  ANALYZE_DAY: monday

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      should_act: ${{ steps.collect.outputs.should_act }}
      resolved_version: ${{ steps.collect.outputs.resolved_version }}
      installed_version: ${{ steps.collect.outputs.installed_version }}
      act_reason: ${{ steps.collect.outputs.act_reason }}
      analyze_day: ${{ steps.collect.outputs.analyze_day }}
      report_tz: ${{ steps.collect.outputs.report_tz }}
      issues_enabled: ${{ steps.collect.outputs.issues_enabled }}
      observed_findings_present: ${{ steps.collect.outputs.observed_findings_present }}
      stats_artifact_name: ${{ steps.collect.outputs.stats_artifact_name }}
      findings_artifact_name: ${{ steps.collect.outputs.findings_artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Collect runtime inputs from GitHub API
        id: collect_inputs
        uses: actions/github-script@v8
        env:
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
          SOURCE_GITHUB_TOKEN: ${{ secrets.TOOLKIT_READ_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const [sourceOwner, sourceRepo] = process.env.SOURCE_REPO.split("/");
            const sourceToken = process.env.SOURCE_GITHUB_TOKEN;

            const listSourceTags = async () => {
              const tags = [];
              let page = 1;

              while (true) {
                const response = await fetch(
                  `https://api.github.com/repos/${sourceOwner}/${sourceRepo}/tags?per_page=100&page=${page}`,
                  {
                    headers: {
                      Accept: "application/vnd.github+json",
                      Authorization: `Bearer ${sourceToken}`,
                      "User-Agent": "doctor-workflow",
                      "X-GitHub-Api-Version": "2022-11-28",
                    },
                  }
                );

                if (!response.ok) {
                  const payload = await response.text();
                  throw new Error(
                    `Failed to list source tags for ${sourceOwner}/${sourceRepo}: ${response.status} ${payload}`
                  );
                }

                const pageItems = await response.json();
                tags.push(...pageItems);

                if (pageItems.length < 100) {
                  break;
                }

                page += 1;
              }

              return tags;
            };

            const repoMeta = await github.rest.repos.get({ owner, repo });
            const repoDefaultBranch = repoMeta.data.default_branch;
            const issuesEnabled = repoMeta.data.has_issues ? "true" : "false";

            const now = new Date();
            const reportDate = now.toISOString().slice(0, 10);
            const reportDateStart = new Date(`${reportDate}T00:00:00Z`);
            const windowTo = reportDateStart.toISOString();
            const windowFrom = new Date(reportDateStart.getTime() - 24 * 60 * 60 * 1000).toISOString();
            const collectedAt = now.toISOString();

            const sourceTags = await listSourceTags();
            const sourceTagNames = sourceTags.map((item) => item.name);

            const commits = await github.paginate(github.rest.repos.listCommits, {
              owner,
              repo,
              since: windowFrom,
              until: windowTo,
              per_page: 100,
            });
            const dailyCommits = commits.map((item) => ({
              sha: item.sha,
              author: item.author?.login || item.commit?.author?.name || "unknown",
              authored_at: item.commit?.author?.date || null,
              message: item.commit?.message || "",
            }));

            const pullsAll = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "all",
              sort: "updated",
              direction: "desc",
              per_page: 100,
            });
            const inWindow = (value) => {
              if (!value) {
                return false;
              }
              return value >= windowFrom && value < windowTo;
            };
            const mapPull = (item) => ({
              number: item.number,
              author: item.user?.login || "unknown",
              title: item.title || "",
              state: item.state || "open",
              created_at: item.created_at,
              merged_at: item.merged_at,
              closed_at: item.closed_at,
              labels: (item.labels || []).map((label) => label.name),
              assignees: (item.assignees || []).map((assignee) => assignee.login),
            });
            const dailyPRs = pullsAll
              .filter((item) => inWindow(item.created_at) || inWindow(item.merged_at) || inWindow(item.closed_at))
              .map(mapPull);

            const issuesAll = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              since: windowFrom,
              per_page: 100,
            });
            const isPlainIssue = (item) => !item.pull_request;
            const mapIssue = (item) => ({
              number: item.number,
              author: item.user?.login || "unknown",
              title: item.title || "",
              state: item.state || "open",
              created_at: item.created_at,
              closed_at: item.closed_at,
              labels: (item.labels || []).map((label) =>
                typeof label === "string" ? label : label.name
              ),
              assignees: (item.assignees || []).map((assignee) => assignee.login),
            });
            const dailyIssues = issuesAll
              .filter((item) => isPlainIssue(item) && (inWindow(item.created_at) || inWindow(item.closed_at)))
              .map(mapIssue);

            const pullsOpen = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const snapshotPRs = pullsOpen.map((item) => ({
              number: item.number,
              author: item.user?.login || "unknown",
              title: item.title || "",
              created_at: item.created_at,
              days_open: Math.floor((Date.now() - Date.parse(item.created_at)) / 86400000),
              labels: (item.labels || []).map((label) => label.name),
              assignees: (item.assignees || []).map((assignee) => assignee.login),
            }));

            const issuesOpen = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const snapshotIssues = issuesOpen
              .filter(isPlainIssue)
              .map((item) => ({
                number: item.number,
                author: item.user?.login || "unknown",
                title: item.title || "",
                created_at: item.created_at,
                assignees: (item.assignees || []).map((assignee) => assignee.login),
                labels: (item.labels || []).map((label) =>
                  typeof label === "string" ? label : label.name
                ),
              }));

            // TODO: populate managed_files and reference_files from agent-toolkit
            // when act integration starts using the real bundle manifest.
            const expectedManifest = {
              managed_files: {},
              reference_files: {},
              bootstrap_files: ["AGENTS.md", "CLAUDE.md", "DOCS.md"],
              observed_paths: [
                "docs/",
                "docs/quickstart.md",
                "docs/INDEX.md",
                ".specify/memory/constitution.md",
                ".gitignore",
              ],
              required_gitignore_rules: [".codex", ".claude", ".specify", "specs/*"],
            };

            const activityPayload = {
              commits: dailyCommits,
              prs: dailyPRs,
              issues: dailyIssues,
              snapshot_prs: snapshotPRs,
              snapshot_issues: snapshotIssues,
            };

            const workDir = path.join(process.env.RUNNER_TEMP, "doctor-inputs");
            fs.mkdirSync(workDir, { recursive: true });

            const expectedManifestPath = path.join(workDir, "expected-manifest.json");
            const sourceTagsPath = path.join(workDir, "source-tags.json");
            const activityPath = path.join(workDir, "activity.json");

            fs.writeFileSync(expectedManifestPath, JSON.stringify(expectedManifest));
            fs.writeFileSync(sourceTagsPath, JSON.stringify(sourceTagNames));
            fs.writeFileSync(activityPath, JSON.stringify(activityPayload));

            core.setOutput("expected_manifest_path", expectedManifestPath);
            core.setOutput("source_tags_path", sourceTagsPath);
            core.setOutput("activity_path", activityPath);
            core.setOutput("repo_default_branch", repoDefaultBranch);
            core.setOutput("issues_enabled", issuesEnabled);
            core.setOutput("collected_at", collectedAt);
            core.setOutput("report_date", reportDate);
            core.setOutput("window_from", windowFrom);
            core.setOutput("window_to", windowTo);

      - name: Checkout toolkit source for collect manifest
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          path: .doctor-source
          token: ${{ secrets.TOOLKIT_READ_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Build expected manifest
        id: build_manifest
        env:
          DOCTOR_REPO_ROOT: ${{ github.workspace }}
          DOCTOR_SOURCE_ROOT: ${{ github.workspace }}/.doctor-source
          DOCTOR_SOURCE_TAGS_PATH: ${{ steps.collect_inputs.outputs.source_tags_path }}
          DOCTOR_TARGET_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_version || '' }}
          DOCTOR_ALLOW_BREAKING_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_breaking_update || 'false' }}
        run: |
          python - <<'PY'
          import importlib.util
          import json
          import os
          import subprocess
          from pathlib import Path

          repo_root = Path(os.environ["DOCTOR_REPO_ROOT"]).resolve()
          source_root = Path(os.environ["DOCTOR_SOURCE_ROOT"]).resolve()
          source_tags = json.loads(Path(os.environ["DOCTOR_SOURCE_TAGS_PATH"]).read_text(encoding="utf-8"))
          target_version = os.environ.get("DOCTOR_TARGET_VERSION") or None
          allow_breaking_update = os.environ.get("DOCTOR_ALLOW_BREAKING_UPDATE", "false").lower() == "true"

          spec = importlib.util.spec_from_file_location(
              "doctor_collect",
              repo_root / ".github" / "workflows" / "collect.py",
          )
          assert spec is not None and spec.loader is not None

          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          version_state = module.resolve_version_state(
              repo_root=repo_root,
              target_version=target_version,
              source_tags=source_tags,
              allow_breaking_update=allow_breaking_update,
          )

          if version_state["resolved_version"] and not version_state["fatal_error"]:
              subprocess.run(
                  ["git", "checkout", "--force", version_state["resolved_version"]],
                  cwd=source_root,
                  check=True,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              expected_manifest = module.build_expected_manifest_from_source(
                  source_root=source_root,
                  resolved_version=version_state["resolved_version"],
              )
          else:
              expected_manifest = module.build_expected_manifest_stub()

          work_dir = Path(os.environ["RUNNER_TEMP"]) / "doctor-inputs"
          work_dir.mkdir(parents=True, exist_ok=True)
          output_path = work_dir / "expected-manifest.json"
          output_path.write_text(json.dumps(expected_manifest), encoding="utf-8")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"expected_manifest_path={output_path}\n")
          PY

      - name: Run collect
        id: collect
        env:
          DOCTOR_REPO_ROOT: ${{ github.workspace }}
          DOCTOR_OUTPUT_DIR: ${{ runner.temp }}/doctor
          DOCTOR_EXPECTED_MANIFEST_PATH: ${{ steps.build_manifest.outputs.expected_manifest_path }}
          DOCTOR_SOURCE_TAGS_PATH: ${{ steps.collect_inputs.outputs.source_tags_path }}
          DOCTOR_ACTIVITY_PATH: ${{ steps.collect_inputs.outputs.activity_path }}
          DOCTOR_TARGET_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_version || '' }}
          DOCTOR_ALLOW_BREAKING_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_breaking_update || 'false' }}
          DOCTOR_ISSUES_ENABLED: ${{ steps.collect_inputs.outputs.issues_enabled }}
          DOCTOR_REPO_FULL_NAME: ${{ github.repository }}
          DOCTOR_REPO_DEFAULT_BRANCH: ${{ steps.collect_inputs.outputs.repo_default_branch }}
          DOCTOR_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'auto' }}
          DOCTOR_SOURCE_REPO: ${{ env.SOURCE_REPO }}
          DOCTOR_COLLECTED_AT: ${{ steps.collect_inputs.outputs.collected_at }}
          DOCTOR_REPORT_DATE: ${{ steps.collect_inputs.outputs.report_date }}
          DOCTOR_WINDOW_FROM: ${{ steps.collect_inputs.outputs.window_from }}
          DOCTOR_WINDOW_TO: ${{ steps.collect_inputs.outputs.window_to }}
          DOCTOR_ANALYZE_DAY: ${{ env.ANALYZE_DAY }}
          DOCTOR_REPORT_TZ: ${{ env.REPORT_TZ }}
        run: python .github/workflows/collect.py

      - name: Upload doctor-stats artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.stats_artifact_name }}
          path: ${{ runner.temp }}/doctor/doctor-stats.json
          if-no-files-found: error

      - name: Upload doctor-findings artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.findings_artifact_name }}
          path: ${{ runner.temp }}/doctor/doctor-findings.json
          if-no-files-found: error

  act:
    needs: collect
    if: ${{ needs.collect.outputs.should_act == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download doctor-findings artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.collect.outputs.findings_artifact_name }}
          path: ${{ runner.temp }}/doctor-findings

      - name: Checkout toolkit source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.collect.outputs.resolved_version }}
          path: .doctor-source
          token: ${{ secrets.TOOLKIT_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run act
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCTOR_REPO_ROOT: ${{ github.workspace }}
          DOCTOR_SOURCE_ROOT: ${{ github.workspace }}/.doctor-source
          DOCTOR_FINDINGS_PATH: ${{ runner.temp }}/doctor-findings/doctor-findings.json
          DOCTOR_RESOLVED_VERSION: ${{ needs.collect.outputs.resolved_version }}
          DOCTOR_INSTALLED_VERSION: ${{ needs.collect.outputs.installed_version }}
          DOCTOR_ACT_REASON: ${{ needs.collect.outputs.act_reason }}
          DOCTOR_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCTOR_SOURCE_REPO: ${{ env.SOURCE_REPO }}
          DOCTOR_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .doctor-source/workflows/act.py

  analyze:
    needs:
      - collect
      - act
    if: >-
      ${{
        always() &&
        needs.collect.result == 'success' &&
        (needs.act.result == 'success' || needs.act.result == 'skipped')
      }}
    # Required for reusable gh-aw analyze with safe outputs. GitHub validates
    # the caller permission envelope before analyze starts; the current
    # compiled lock also requests discussions: write.
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
      discussions: write
    uses: ./.github/workflows/doctor-analyze.lock.yml
    secrets: inherit
    with:
      mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'auto' }}
      target_version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_version || '' }}
      allow_breaking_update: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_breaking_update == 'true' }}
      force_analyze: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_analyze == 'true' }}
      analyze_day: ${{ needs.collect.outputs.analyze_day }}
      report_tz: ${{ needs.collect.outputs.report_tz }}
      issues_enabled: ${{ needs.collect.outputs.issues_enabled }}
      observed_findings_present: ${{ needs.collect.outputs.observed_findings_present }}
      stats_artifact_name: ${{ needs.collect.outputs.stats_artifact_name }}
      findings_artifact_name: ${{ needs.collect.outputs.findings_artifact_name }}
      resolved_version: ${{ needs.collect.outputs.resolved_version }}
      installed_version: ${{ needs.collect.outputs.installed_version }}
