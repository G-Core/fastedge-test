name: Integration Tests

on:
  pull_request:
    branches: ["*.*.x", "*.x", "main", "next", "next-major", "beta", "alpha"]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: ./.github/setup-node

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Read pinned CLI version
        id: cli-version
        run: echo "version=$(cat .fastedge-cli-version)" >> $GITHUB_OUTPUT

      - name: Setup FastEdge Run CLI
        uses: ./.github/setup-fastedge-cli
        with:
          cli_version: ${{ steps.cli-version.outputs.version }}
          github_token: ${{ github.token }}

      - name: Build (including WASM test apps)
        run: pnpm run build:ci-test

      - name: Run tests
        run: pnpm test

  fossa:
    uses: ./.github/workflows/fossa.yaml
    secrets:
      FOSSA_PUB_API_KEY: ${{ secrets.FOSSA_PUB_API_KEY }}
